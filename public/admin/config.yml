              - { label: "Kaayyoo", name: objective, widget: string }
              - { label: "Quunnamtii", name: contact, widget: string }
              - { label: "Afaan Label", name: switchLang, widget: string }
          - label: "Hero Kutaa"
            name: hero
            widget: object
            fields:
              - { label: "Mata Duree", name: title, widget: string }
              - { label: "Ibsa Gabaabaa", name: subtitle, widget: text }
              - { label: "CTA Buttoonii", name: cta, widget: string }
              - { label: "Dabalata Baraa Buttoonii", name: learnMore, widget: string }
          - label: "Fuula Jalqabaa"
            name: home
            widget: object
            fields:
              - { label: "Mata Duree Simannaa", name: welcomeTitle, widget: string }
              - { label: "Barreeffama Simannaa", name: welcomeText, widget: text }
              - { label: "Mata Duree Waaqeffannaa", name: worshipTitle, widget: string }
