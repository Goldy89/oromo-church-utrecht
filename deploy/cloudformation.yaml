AWSTemplateFormatVersion: '2010-09-09'
Description: Oromo Christian Church Utrecht - S3 + CloudFront Static Website

Parameters:
  ProjectName:
    Type: String
    Default: oromo-church-utrecht
  DomainName:
    Type: String
    Default: ''
    Description: Custom domain name (e.g. oromochurchutrecht.nl). Leave empty to use CloudFront domain only.
  CertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN (must be in us-east-1). Required if DomainName is set.
  HostedZoneId:
    Type: String
    Default: ''
    Description: Route 53 Hosted Zone ID for the domain. Required if DomainName is set.
  GitHubClientId:
    Type: String
    Description: GitHub OAuth App Client ID
  GitHubClientSecretParam:
    Type: String
    Default: /oromo-church-utrecht/github-oauth-client-secret
    Description: SSM Parameter Store path for GitHub OAuth Client Secret
  OAuthLambdaS3Key:
    Type: String
    Default: oauth-lambda.zip
    Description: S3 key for the OAuth Lambda deployment package

Conditions:
  HasDomain: !Not [!Equals [!Ref DomainName, '']]

Resources:
  # ----------------------------------------------------------------
  # OAuth Lambda — GitHub authentication proxy for Decap CMS
  # ----------------------------------------------------------------
  OAuthLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-oauth-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SSMAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:PutParameter
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GitHubClientSecretParam}'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/jwt-secret'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/admin-users'
        - PolicyName: S3ContentAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${ProjectName}-website/content/*'

  OAuthLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-oauth'
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 10
      MemorySize: 128
      Role: !GetAtt OAuthLambdaRole.Arn
      Code:
        S3Bucket: !Sub '${ProjectName}-website'
        S3Key: !Ref OAuthLambdaS3Key
      Environment:
        Variables:
          GITHUB_CLIENT_ID: !Ref GitHubClientId
          GITHUB_CLIENT_SECRET_PARAM: !Ref GitHubClientSecretParam
          S3_BUCKET: !Sub '${ProjectName}-website'
          JWT_SECRET_PARAM: !Sub '/${ProjectName}/jwt-secret'
          ADMIN_USERS_PARAM: !Sub '/${ProjectName}/admin-users'
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  OAuthHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-oauth-api'
      ProtocolType: HTTP

  OAuthHttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref OAuthHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt OAuthLambdaFunction.Arn
      PayloadFormatVersion: '2.0'

  OAuthHttpApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref OAuthHttpApi
      RouteKey: $default
      Target: !Sub 'integrations/${OAuthHttpApiIntegration}'

  OAuthHttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref OAuthHttpApi
      StageName: $default
      AutoDeploy: true

  OAuthLambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt OAuthLambdaFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OAuthHttpApi}/*'

  # S3 Bucket (private - no public access)
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-website'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Bucket policy allowing CloudFront OAC access
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # Origin Access Control for CloudFront → S3
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${ProjectName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${ProjectName} website'
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Aliases:
          !If
            - HasDomain
            - - !Ref DomainName
              - !Sub 'www.${DomainName}'
            - !Ref 'AWS::NoValue'
        ViewerCertificate:
          !If
            - HasDomain
            - AcmCertificateArn: !Ref CertificateArn
              MinimumProtocolVersion: TLSv1.2_2021
              SslSupportMethod: sni-only
            - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: OAuthApiOrigin
            DomainName: !Sub '${OAuthHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: OAuthApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
              Cookies:
                Forward: none
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0
          - PathPattern: /callback*
            TargetOriginId: OAuthApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            ForwardedValues:
              QueryString: true
              Cookies:
                Forward: none
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03  # SecurityHeadersPolicy
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Route 53 DNS records pointing domain to CloudFront
  DnsRecordA:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (global constant)
        EvaluateTargetHealth: false

  DnsRecordAAAA:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  WwwDnsRecordA:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub 'www.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  WwwDnsRecordAAAA:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub 'www.${DomainName}'
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  WebsiteBucketName:
    Value: !Ref WebsiteBucket
    Description: S3 bucket name
  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
    Description: CloudFront distribution ID
  CloudFrontDomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName
    Description: CloudFront domain name (your website URL)
  WebsiteURL:
    Value: !If
      - HasDomain
      - !Sub 'https://${DomainName}'
      - !Sub 'https://${CloudFrontDistribution.DomainName}'
    Description: Full website URL
  OAuthApiEndpoint:
    Value: !Sub 'https://${OAuthHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    Description: OAuth API Gateway endpoint
